<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2a1f52"/>
      <stop offset="100%" stop-color="#0e0b1a"/>
    </radialGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b8ff"/>
      <stop offset="55%" stop-color="#b388ff"/>
      <stop offset="100%" stop-color="#ffcb6b"/>
    </linearGradient>
  </defs>

  <!-- dark cosmic disc -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- tiny background stars -->
  <circle cx="7" cy="8" r="0.9" fill="#ffcb6b" opacity="0.85"/>
  <circle cx="25" cy="10" r="0.7" fill="#ece8ff" opacity="0.7"/>
  <circle cx="23" cy="24" r="0.8" fill="#b388ff" opacity="0.8"/>

  <!-- main four-pointed sparkle (✦) -->
  <path d="M16 3 Q17.6 14.4 29 16 Q17.6 17.6 16 29 Q14.4 17.6 3 16 Q14.4 14.4 16 3 Z"
        fill="url(#star)"/>
</svg>
